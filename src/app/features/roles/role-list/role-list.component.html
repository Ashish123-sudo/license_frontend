<div class="list-header">
  <h2 class="list-title">
    Product Roles
    <mat-icon class="title-arrow">arrow_drop_down</mat-icon>
  </h2>
  <button mat-flat-button class="new-btn" (click)="navigateToAdd()">
    <mat-icon>add</mat-icon>
  </button>
</div>

<div class="table-wrap">
  <table mat-table [dataSource]="roles" class="roles-table">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>ROLE NAME</th>
      <td mat-cell *matCellDef="let role">
        <span class="name-link">{{ role.name }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>DESCRIPTION / PERMISSIONS</th>
      <td mat-cell *matCellDef="let role" class="secondary-text">
        {{ role.description }}
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>STATUS</th>
      <td mat-cell *matCellDef="let role">
        <span [class]="role.isActive ? 'badge-active' : 'badge-inactive'">
          {{ role.isActive ? 'Active' : 'Inactive' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let role" class="actions-cell">
        <button mat-icon-button (click)="editRole(role.roleId)">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['name', 'description', 'status', 'actions']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['name', 'description', 'status', 'actions'];" class="table-row"></tr>
  </table>

  @if (roles.length === 0) {
    <div class="empty-state">
      <mat-icon>security</mat-icon>
      <p>No roles found</p>
    </div>
  }
</div>
