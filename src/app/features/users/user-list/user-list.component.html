<div class="list-page">

  <div class="list-header">
    <h2 class="list-title">
      Product Users
      <mat-icon class="title-arrow">arrow_drop_down</mat-icon>
    </h2>
    <button mat-flat-button class="new-btn" (click)="navigateToAdd()">
      <mat-icon>person_add</mat-icon>
    </button>
  </div>

  <div class="table-wrap">
    <table mat-table [dataSource]="users" class="users-table">

      <ng-container matColumnDef="userName">
        <th mat-header-cell *matHeaderCellDef>USERNAME</th>
        <td mat-cell *matCellDef="let user">
          <span class="name-link">{{ user.userName }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>ROLE</th>             <!-- was: ROLE ID — fixed -->
        <td mat-cell *matCellDef="let user">{{ user.role?.name }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user" class="actions-cell">
          <button mat-icon-button (click)="editUser(user.userId)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="deleteUser(user.userId)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>

    </table>

    <div *ngIf="loading" class="loading-state">
      <mat-spinner diameter="32"></mat-spinner>
      <span>Loading users...</span>
    </div>

    <div *ngIf="!loading && users.length === 0" class="empty-list-state">
      <mat-icon>people</mat-icon>
      <p>No users found.</p>
    </div>

  </div>

</div>
