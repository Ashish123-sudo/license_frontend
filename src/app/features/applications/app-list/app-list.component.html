<div class="list-page">

  <div class="list-header">
    <h2 class="list-title">
      Applications
      <mat-icon class="title-arrow">arrow_drop_down</mat-icon>
    </h2>
    <button mat-flat-button class="new-btn" (click)="navigateToAdd()">
      <mat-icon>add_box</mat-icon>
    </button>
  </div>

  <div class="search-bar">
    <mat-icon class="search-icon">search</mat-icon>
    <input type="text" placeholder="Search applications..." class="search-input">
  </div>

  <div class="table-wrap">
    <table mat-table [dataSource]="applications" class="apps-table">

      <ng-container matColumnDef="appName">
        <th mat-header-cell *matHeaderCellDef>APPLICATION NAME</th>
        <td mat-cell *matCellDef="let app">
          <span class="name-link">{{ app.appName }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="owner">
        <th mat-header-cell *matHeaderCellDef>PRODUCT OWNER</th>   <!-- was: PRODUCT OWNER ID — fixed -->
       <td mat-cell *matCellDef="let app" class="secondary-text">
        {{ app.productOwner?.userName }}
      </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>STATUS</th>
        <td mat-cell *matCellDef="let app">
          <span [class]="app.isActive ? 'badge-active' : 'badge-inactive'">
            {{ app.isActive ? 'Available' : 'Disabled' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let app" class="actions-cell">
          <button mat-icon-button (click)="editApp(app.appId)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="deleteApp(app)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>

    </table>

    <div *ngIf="loading" class="loading-state">
      <mat-spinner diameter="32"></mat-spinner>
      <span>Loading applications...</span>
    </div>

    <div *ngIf="!loading && applications.length === 0" class="empty-list-state">
      <mat-icon>apps</mat-icon>
      <p>No applications found.</p>
    </div>

  </div>

</div>
